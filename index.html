<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포시키 Posiki</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: #1a1a1a;
    background: #ffffff;
  }
  a { color: inherit; }
  header {
    text-align: center;
    padding: 64px 20px 40px;
  }
  header img {
    height: 56px;
  }
  main {
    max-width: 1040px;
    margin: 0 auto;
    padding: 0 20px 60px;
    display: flex;
    flex-direction: column;
    gap: 64px;
  }
  .app-section {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .app-header {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #f3f2ee;
    border-radius: 20px;
    padding: 22px 28px;
    text-decoration: none;
  }
  .app-header img.icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    flex-shrink: 0;
  }
  .app-header h2 {
    margin: 0 0 4px;
    font-size: 1.25rem;
    font-weight: 700;
    color: #1a1a1a;
  }
  .app-header p {
    margin: 0;
    font-size: 0.95rem;
    color: #666;
  }
  .shots {
    display: flex;
    align-items: flex-end;
    gap: 18px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .shots img {
    display: block;
    height: 340px;
    width: auto;
    border-radius: 22px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    flex-shrink: 0;
  }
  .shots img.hero {
    height: 400px;
  }
  .shots.buzztalk img {
    height: 380px;
  }
  footer {
    text-align: center;
    padding: 32px 20px 48px;
    font-size: 0.83rem;
    color: #888;
    border-top: 1px solid #ececec;
    line-height: 1.7;
  }

  @media (max-width: 640px) {
    .shots img { height: 260px; }
    .shots img.hero { height: 300px; }
    .shots.buzztalk img { height: 280px; }
    .app-header { flex-direction: row; padding: 18px 20px; }
  }
</style>
</head>
<body>
  <header>
    <img src="assets/posiki-logo.png" alt="Posiki">
  </header>

  <main>
    <section class="app-section">
      <a class="app-header" href="https://apps.apple.com/kr/app/eyeday-%EC%95%88%EC%95%BD-%EC%95%8C%EB%99%B4-%EC%A0%90%EC%95%88-%EA%B8%B0%EB%A1%9D/id6759497954">
        <img class="icon" src="assets/icon-eyeday.png" alt="아이데이 아이콘">
        <div>
          <h2>아이데이 - 안약 알람 &amp; 점안 기록</h2>
          <p>라식, 녹내장 등 안약 점안 관리</p>
        </div>
      </a>
      <div class="shots">
        <img class="hero" src="assets/eyeday-1.png" alt="라식, 녹내장, 안구건조증 등 안약 리마인더">
        <img src="assets/eyeday-2.png" alt="안약에 특화된 투약 관리">
        <img src="assets/eyeday-3.png" alt="안압을 꾸준히 기록해 보세요">
        <img src="assets/eyeday-4.png" alt="안약 간격을 안전하게 지켜줍니다">
        <img src="assets/eyeday-5.png" alt="큰 글씨 설정이 가능해요">
      </div>
    </section>

    <section class="app-section">
      <a class="app-header" href="https://yoonly93.github.io/buzztalk/">
        <img class="icon" src="assets/icon-buzztalk.png" alt="실검톡 아이콘">
        <div>
          <h2>실검톡 - BuzzTalk</h2>
          <p>뉴스보다 빠른 반응, 실시간 검색어로 모이는 오픈 채팅</p>
        </div>
      </a>
      <div class="shots buzztalk">
        <img src="assets/buzztalk-1.png" alt="실시간 검색어 기반 랜덤 채팅">
        <img src="assets/buzztalk-2.png" alt="실검톡 실시간 검색어 리스트">
        <img src="assets/buzztalk-3.png" alt="종합부동산세 오픈 채팅">
      </div>
    </section>
  </main>

  <footer>
    포시키<br>
    마포구 포은로8길 29, 2091호(망원동)<br>
    마포구 - 04011 · 대한민국(KR)<br>
    © 2026 Posiki
  </footer>
</body>
</html>
