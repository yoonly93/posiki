<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포시키 Posiki</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: #1a1a1a;
    background: #ffffff;
  }
  a { color: inherit; }
  header {
    text-align: center;
    padding: 56px 20px 32px;
  }
  header img {
    height: 92px;
  }
  main {
    max-width: 1040px;
    margin: 0 auto;
    padding: 0 20px 56px;
    display: flex;
    flex-direction: column;
    gap: 52px;
  }
  .app-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }
  .app-header {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #f3f2ee;
    border-radius: 18px;
    padding: 16px 22px;
    text-decoration: none;
    width: 100%;
    max-width: 640px;
  }
  .app-header img.icon {
    width: 44px;
    height: 44px;
    border-radius: 11px;
    flex-shrink: 0;
  }
  .app-header img.icon.icon-capa {
    background: #f7f1ea;
    object-fit: contain;
  }
  .app-header h2 {
    margin: 0 0 2px;
    font-size: 1.02rem;
    font-weight: 700;
    color: #1a1a1a;
  }
  .app-header p {
    margin: 0;
    font-size: 0.8rem;
    color: #666;
  }
  .shots {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 16px;
    width: 100%;
    overflow-x: auto;
    scroll-snap-type: x proximity;
    scroll-padding: 0 20px;
    -webkit-overflow-scrolling: touch;
    padding: 4px 4px 10px;
    scrollbar-width: none;
  }
  .shots::-webkit-scrollbar { display: none; }
  .shots img {
    display: block;
    height: 300px;
    width: auto;
    aspect-ratio: 540 / 1169;
    border-radius: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    flex-shrink: 0;
    scroll-snap-align: center;
  }
  .shots img.hero {
    height: 340px;
  }
  .shots.buzztalk img {
    height: 320px;
  }
  footer {
    text-align: center;
    padding: 28px 20px 44px;
    font-size: 0.78rem;
    color: #888;
    border-top: 1px solid #ececec;
    line-height: 1.7;
  }

  @media (max-width: 640px) {
    header { padding: 40px 20px 24px; }
    header img { height: 68px; }
    main { gap: 40px; }
    .app-header { padding: 14px 18px; max-width: 100%; }
    .shots { justify-content: flex-start; scroll-snap-type: x mandatory; }
    .shots img { height: 220px; }
    .shots img.hero { height: 250px; }
    .shots.buzztalk img { height: 240px; }
  }
</style>
</head>
<body>
  <header>
    <img src="assets/posiki-logo.png" alt="Posiki">
  </header>

  <main>
    <section class="app-section">
      <a class="app-header" href="https://apps.apple.com/kr/app/eyeday-%EC%95%88%EC%95%BD-%EC%95%8C%EB%99%B4-%EC%A0%90%EC%95%88-%EA%B8%B0%EB%A1%9D/id6759497954">
        <img class="icon" src="assets/icon-eyeday.png" alt="아이데이 아이콘">
        <div>
          <h2>아이데이 - 안약 알람 &amp; 점안 기록</h2>
          <p>라식, 녹내장 등 안약 점안 관리</p>
        </div>
      </a>
      <div class="shots">
        <img class="hero" src="assets/eyeday-1.png" alt="라식, 녹내장, 안구건조증 등 안약 리마인더">
        <img src="assets/eyeday-2.png" alt="안약에 특화된 투약 관리">
        <img src="assets/eyeday-3.png" alt="안압을 꾸준히 기록해 보세요">
        <img src="assets/eyeday-4.png" alt="안약 간격을 안전하게 지켜줍니다">
        <img src="assets/eyeday-5.png" alt="큰 글씨 설정이 가능해요">
      </div>
    </section>

    <section class="app-section">
      <a class="app-header" href="https://yoonly93.github.io/buzztalk/">
        <img class="icon" src="assets/icon-buzztalk.png" alt="실검톡 아이콘">
        <div>
          <h2>실검톡 - BuzzTalk</h2>
          <p>뉴스보다 빠른 반응, 실시간 검색어로 모이는 오픈 채팅</p>
        </div>
      </a>
      <div class="shots buzztalk">
        <img src="assets/buzztalk-1.png" alt="실시간 검색어 기반 랜덤 채팅">
        <img src="assets/buzztalk-2.png" alt="실검톡 실시간 검색어 리스트">
        <img src="assets/buzztalk-3.png" alt="종합부동산세 오픈 채팅">
      </div>
    </section>

    <section class="app-section">
      <div class="app-header">
        <img class="icon icon-capa" src="assets/icon-capa.png" alt="Capa 아이콘">
        <div>
          <h2>Capa - 원두 카드 &amp; 핸드드립 타이머</h2>
          <p>원두 정보 스캔, 기록, 레시피 관리</p>
        </div>
      </div>
      <div class="shots">
        <img src="assets/capa-1.png" alt="원두를 살 때마다, 마실 때마다 멋진 기록을 남겨보세요">
        <img src="assets/capa-2.png" alt="원두 카드 사진 찍어서 정보를 자동으로 입력해요">
        <img src="assets/capa-3.png" alt="위젯으로 원두 정보를 추가하거나, 핸드브루 타이머를 바로 시작해보세요">
        <img src="assets/capa-4.png" alt="나의 레시피를 세상에 공개하고 의견을 주고받아보세요">
        <img src="assets/capa-5.png" alt="바리스타 챔피언들의 레시피를 그대로 내려보세요">
      </div>
    </section>
  </main>

  <footer>
    포시키<br>
    마포구 포은로8길 29, 2091호(망원동)<br>
    마포구 - 04011 · 대한민국(KR)<br>
    © 2026 Posiki
  </footer>
</body>
</html>
