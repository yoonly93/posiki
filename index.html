<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포시키 Posiki</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: #1a1a1a;
    background: #fafafa;
    line-height: 1.6;
  }
  header {
    text-align: center;
    padding: 56px 20px 24px;
  }
  header h1 {
    font-size: 1.9rem;
    font-weight: 700;
    margin: 0 0 8px;
  }
  header p {
    margin: 0;
    color: #666;
    font-size: 1rem;
  }
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 20px 40px;
    display: grid;
    gap: 20px;
  }
  .card {
    background: #fff;
    border: 1px solid #ececec;
    border-radius: 16px;
    padding: 28px 24px;
  }
  .card h2 {
    margin: 0 0 6px;
    font-size: 1.3rem;
  }
  .card .desc {
    margin: 0 0 18px;
    color: #444;
  }
  .btns {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .btn {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 0.92rem;
    font-weight: 600;
    text-decoration: none;
    background: #111;
    color: #fff;
  }
  .btn.line {
    background: #fff;
    color: #111;
    border: 1px solid #d5d5d5;
  }
  footer {
    text-align: center;
    padding: 28px 20px 44px;
    font-size: 0.83rem;
    color: #888;
    border-top: 1px solid #ececec;
  }
</style>
</head>
<body>
  <header>
    <h1>포시키 Posiki</h1>
    <p>아이데이(eyeday)와 실검톡(BuzzTalk)을 함께 운영하고 있습니다.</p>
  </header>

  <main>
    <section class="card">
      <h2>아이데이 · eyeday</h2>
      <p class="desc">안약 관리와 복용 알림, 안압 수치 기록까지. 눈 건강을 매일 챙기세요.</p>
      <div class="btns">
        <a class="btn" href="https://apps.apple.com/kr/app/eyeday-%EC%95%88%EC%95%BD-%EC%95%8C%EB%99%B4-%EC%A0%90%EC%95%88-%EA%B8%B0%EB%A1%9D/id6759497954">App Store</a>
        <a class="btn line" href="https://play.google.com/store/apps/details?id=com.eyedrop.reminder&hl=ko">Google Play</a>
      </div>
    </section>

    <section class="card">
      <h2>실검톡 · BuzzTalk</h2>
      <p class="desc">실시간 검색어를 기반으로 같은 주제에 관심 있는 사람들이 익명으로 대화할 수 있어요.</p>
      <div class="btns">
        <a class="btn" href="https://yoonly93.github.io/buzztalk/">자세히 보기</a>
      </div>
    </section>
  </main>

  <footer>
    포시키<br>
    마포구 포은로8길 29, 2091호(망원동)<br>
    마포구 - 04011 · 대한민국(KR)<br>
    © 2026 Posiki
  </footer>
</body>
</html>
